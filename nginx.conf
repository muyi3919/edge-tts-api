# Edge TTS API Nginx 反向代理配置
# 将此配置添加到宝塔面板站点配置中
# 或保存为独立配置文件后 include

server {
    listen 80;
    server_name tts.kina.ink;

    # HTTP 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tts.kina.ink;

    # SSL 证书配置（宝塔面板自动生成）
    # ssl_certificate /www/server/panel/vhost/cert/tts.kina.ink/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/tts.kina.ink/privkey.pem;

    # 反向代理到 Edge TTS API 服务
    location / {
        proxy_pass http://127.0.0.1:9178;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长连接设置（TTS 生成可能需要时间）
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 音频流不缓冲，直接转发
        proxy_buffering off;
        proxy_cache off;

        # 支持大文件传输
        client_max_body_size 50M;
    }

    # 可选：静态文件服务（API 文档页面）
    # location /docs {
    #     alias /www/edge-tts-api/docs;
    #     index index.html;
    # }
}
